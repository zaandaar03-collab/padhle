<!DOCTYPE html>
<html>
<head>
    <title>My Special Page</title>
    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        img {
            width: 400px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            background: #1e40ff;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0f2ed1;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <img src="myimage.jpg" alt="My Image">

    <audio id="audio">
        <source src="myaudio.mp3" type="audio/mpeg">
    </audio>

    <button onclick="playAudio()">Click</button>

    <script>
        function playAudio() {
            document.getElementById("audio").play();
        }
    </script>

</body>
</html>
