<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Special Page</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

img{
    max-width:80%;
    max-height:70vh;
    border-radius:15px;
    box-shadow:0 0 30px rgba(255,255,255,0.3);
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    background:#e10600;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<img src="myimage.jpg" alt="My Image">

<button onclick="playAudio()">Play Audio</button>

<audio id="audio" autoplay>
    <source src="myaudio.mp3" type="audio/mpeg">
</audio>

<script>
function playAudio(){
    document.getElementById("audio").play();
}
</script>

</body>
</html>
